---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcl-config
  namespace: governed-cognitive-loop
data:
  GCL_FORCE_DETERMINISTIC: "1"
  GCL_CORS_ORIGINS: "*"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcl-app
  namespace: governed-cognitive-loop
  labels:
    app: gcl-app
    app.kubernetes.io/part-of: governed-cognitive-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcl-app
  template:
    metadata:
      labels:
        app: gcl-app
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: gcl-app
          image: quay.io/rh-ee-jkershaw/gcl-demo:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: gcl-config
          env:
            - name: GCL_LEDGER_URL
              value: "http://ledger-gateway.sovereign-ai-lab.svc:28099"
            - name: GCL_FLEET_URL
              value: "http://fleet-controller.fleet-llm-d.svc:8080"
            - name: GCL_FLEET_TOKEN
              value: "oberon-fleet-secret-2026"
            - name: DEEPFIELD_FLEET_URL
              value: "http://deepfield-fleet.fleet-llm-d.svc:8000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gcl-app
  namespace: governed-cognitive-loop
  labels:
    app: gcl-app
spec:
  selector:
    app: gcl-app
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gcl-app
  namespace: governed-cognitive-loop
  labels:
    app: gcl-app
spec:
  to:
    kind: Service
    name: gcl-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
