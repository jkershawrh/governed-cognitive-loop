---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcl-config
  namespace: governed-cognitive-loop
data:
  GCL_FORCE_DETERMINISTIC: "1"
  GCL_CORS_ORIGINS: "*"
  GCL_RUNTIME_MODE: "production"
  GCL_ALLOW_LEGACY_FLEET_HMAC_DEVELOPMENT_COMPAT: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcl-app
  namespace: governed-cognitive-loop
  labels:
    app: gcl-app
    app.kubernetes.io/part-of: governed-cognitive-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcl-app
  template:
    metadata:
      labels:
        app: gcl-app
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: gcl-app
          image: quay.io/rh-ee-jkershaw/gcl-demo:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: gcl-config
          env:
            - name: GCL_LEDGER_URL
              value: "http://ledger-gateway.sovereign-ai-lab.svc:28099"
            - name: GCL_LEDGER_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gcl-identity
                  key: ledger-token
                  optional: true
            - name: GCL_FLEET_INTENTS_URL
              value: "http://fleet-controller.fleet-llm-d.svc:8080"
            - name: GCL_FLEET_INTENTS_PATH
              value: "/api/v2/intents"
            - name: GCL_DEEPFIELD_EVENT_SOURCE
              value: "urn:srex:deepfield-fleet"
            - name: GCL_DEEPFIELD_EVENT_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gcl-identity
                  key: deepfield-event-token
            - name: GCL_DECISION_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: gcl-decision-signing
                  key: active-key
            - name: GCL_DECISION_SIGNING_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gcl-decision-signing
                  key: active-key-id
            - name: GCL_FLEET_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gcl-identity
                  key: oidc-token
            - name: DEEPFIELD_FLEET_URL
              value: "http://deepfield-fleet.fleet-llm-d.svc:8000"
            - name: GUARDIAN_URL
              value: "http://localhost:8081"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: guardian
          image: quay.io/rh-ee-jkershaw/guardian:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: GUARDIAN_CONFIG
              value: "/app/guardian.yaml"
          volumeMounts:
            - name: guardian-config
              mountPath: /app/guardian.yaml
              subPath: guardian.yaml
            - name: guardian-policies
              mountPath: /app/policies
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: guardian-config
          configMap:
            name: guardian-config
        - name: guardian-policies
          configMap:
            name: guardian-policies
---
apiVersion: v1
kind: Service
metadata:
  name: gcl-app
  namespace: governed-cognitive-loop
  labels:
    app: gcl-app
spec:
  selector:
    app: gcl-app
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gcl-app
  namespace: governed-cognitive-loop
  labels:
    app: gcl-app
spec:
  to:
    kind: Service
    name: gcl-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
