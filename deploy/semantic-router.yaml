---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-router
  namespace: fleet-llm-d
  labels:
    app: semantic-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: semantic-router
  template:
    metadata:
      labels:
        app: semantic-router
    spec:
      containers:
        - name: semantic-router
          image: ghcr.io/vllm-project/semantic-router/extproc:latest
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /startup-status
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /startup-status
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: semantic-router
  namespace: fleet-llm-d
  labels:
    app: semantic-router
spec:
  selector:
    app: semantic-router
  ports:
    - port: 8080
      targetPort: 8080
      name: grpc
    - port: 9090
      targetPort: 9090
      name: metrics
